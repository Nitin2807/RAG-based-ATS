<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS RAG Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <canvas id="starfield"></canvas>

    <div id="sidebar">
        <div class="sidebar-header">
            <button id="new-chat-btn">
                <i class="fas fa-plus"></i> New Chat
            </button>
            <button id="toggle-sidebar-btn" class="toggle-btn close-btn">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="sidebar-search">
            <input type="text" id="search-chats-input" placeholder="Search chats...">
        </div>
        <div id="chat-list">
        </div>
    </div>

    <div id="main-content">
        <div id="profile-corner">
            <div id="pfp"></div>
            <div id="profile-dropdown" class="hidden">
                <span id="username-dropdown"></span>
                <button id="logout-btn">Logout</button>
            </div>
        </div>
        <button id="open-sidebar-btn" class="toggle-btn open-btn">
             <i class="fas fa-bars"></i>
        </button>

        <!-- Removed #chat-container, main chat elements now directly in main-content --><div id="chat-header">
            <h2>ATS RAG Assistant</h2>
            <span>Powered by Gemini & MongoDB</span>
        </div>
        <div id="chat-messages">
            <div class="message bot-message">
                <p>Hello! I'm your resume assistant. Ask me anything about the candidates in the database.</p>
            </div>
        </div>
        <form id="chat-form">
            <input type="text" id="message-input" placeholder="e.g., 'Who has experience with Python?'" required>
            <button type="submit">Send</button>
        </form>
    </div>

    <script src="/static/script.js" defer></script>
</body>
</html>
